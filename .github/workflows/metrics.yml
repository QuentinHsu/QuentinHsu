# Visit https://github.com/lowlighter/metrics/blob/master/action.yml for full reference
name: Metrics

on:
  schedule: [{ cron: '0 */12 * * *' }]
  push: { branches: ['main'] }
  workflow_dispatch: {}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      # https://github.com/lowlighter/metrics/blob/master/source/templates/classic/README.md
      - name: Classic template
        uses: lowlighter/metrics@latest
        with:
          filename: static/metrics.classic.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: header, repositories
          plugin_lines: yes

      # https://github.com/lowlighter/metrics/blob/master/source/plugins/calendar/README.md
      - name: Full history calendar
        uses: lowlighter/metrics@latest
        with:
          filename: static/metrics.plugin.calendar.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: ''
          plugin_calendar: yes
          plugin_calendar_limit: 1
